<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/logo.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />

    <!-- Viewport for responsive design -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Primary Meta Tags -->
    <title> Arifacts Ceramics | Sculpted by Hand, Inspired by History</title>
    <meta
      name="description"
      content="Shop the best deals on ceramics. Discover exclusive offers and a seamless shopping experience."
    />
    <meta
      name="keywords"
      content="ecommerce, online shopping, ceramics, handmade, deals, shopping, offers"
    />
    <meta name="author" content="Arifacts" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://artifactsceramics.tn" />
    <meta
      property="og:title"
      content="Arifacts ceramics"
    />
    <meta
      property="og:description"
      content="Explore a wide range of products at Artifacts Ceramics. Enjoy exclusive offers and fast delivery."
    />
  


    <!-- Theme Color for Mobile Browsers -->
    <meta name="theme-color" content="#000000" />

    <!-- Google AdSense -->
    <meta name="google-adsense-account" content="ca-pub-6542623777003381" />

    <!-- Canonical URL to prevent duplicate content -->
    <link rel="canonical" href="https://artifactsceramics.tn" />

    <!-- Manifest for PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Additional SEO for Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "artifacts ceramics",
        "url": "https://artifactsceramics.tn",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://artifactsceramics.tn/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>

    <div id="root"></div>
